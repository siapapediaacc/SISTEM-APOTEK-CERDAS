<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Measure Pro Stable</title>

<style>
body { margin:0; background:black; }

video, canvas {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  object-fit:cover;
}

canvas { z-index:2; }

.info {
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  z-index:999;
}

.ui {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
  z-index:999;
}

button {
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>

<div class="info" id="info">Arahkan ke objek persegi</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="ui">
  <button onclick="captureCalibration()">Kalibrasi</button>
  <button onclick="unlock()">Unlock</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let scale = null;
let locked = false;
let stableCorners = null;

// kamera
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
}).then(stream => {
  video.srcObject = stream;
});

video.onloadedmetadata = () => {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  loop();
};

function loop() {
  ctx.drawImage(video, 0, 0);

  let corners = detectCorners();

  if (!locked && corners) {
    stableCorners = smooth(corners, stableCorners);
  }

  if (stableCorners) {
    draw(stableCorners);

    if (scale) measure(stableCorners);
  }

  requestAnimationFrame(loop);
}

// smoothing biar stabil
function smooth(newC, oldC) {
  if (!oldC) return newC;

  return newC.map((p,i)=>({
    x: oldC[i].x * 0.8 + p.x * 0.2,
    y: oldC[i].y * 0.8 + p.y * 0.2
  }));
}

// deteksi sudut sederhana
function detectCorners() {
  let img = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = img.data;

  let points = [];

  for (let y=20; y<canvas.height-20; y+=8) {
    for (let x=20; x<canvas.width-20; x+=8) {

      let i = (y*canvas.width + x)*4;
      let b = (data[i]+data[i+1]+data[i+2])/3;

      let i2 = ((y+5)*canvas.width + (x+5))*4;
      let b2 = (data[i2]+data[i2+1]+data[i2+2])/3;

      if (Math.abs(b - b2) > 50) {
        points.push({x,y});
      }
    }
  }

  if (points.length < 100) return null;

  return getCorners(points);
}

function getCorners(points) {
  let tl,tr,bl,br;
  let minSum=99999,maxSum=0,minDiff=99999,maxDiff=-99999;

  points.forEach(p=>{
    let sum=p.x+p.y;
    let diff=p.x-p.y;

    if(sum<minSum){minSum=sum;tl=p;}
    if(sum>maxSum){maxSum=sum;br=p;}
    if(diff<minDiff){minDiff=diff;bl=p;}
    if(diff>maxDiff){maxDiff=diff;tr=p;}
  });

  return [tl,tr,br,bl];
}

function draw(c) {
  ctx.beginPath();
  ctx.moveTo(c[0].x,c[0].y);
  ctx.lineTo(c[1].x,c[1].y);
  ctx.lineTo(c[2].x,c[2].y);
  ctx.lineTo(c[3].x,c[3].y);
  ctx.closePath();

  ctx.strokeStyle="lime";
  ctx.lineWidth=3;
  ctx.stroke();
}

function distance(a,b){
  return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
}

function measure(c){
  let w = (distance(c[0],c[1])+distance(c[2],c[3]))/2;
  let h = (distance(c[0],c[3])+distance(c[1],c[2]))/2;

  let wcm = w * scale;
  let hcm = h * scale;

  let area = wcm * hcm;

  document.getElementById("info").innerText =
    `P:${wcm.toFixed(2)} cm L:${hcm.toFixed(2)} cm Luas:${area.toFixed(2)} cm²`;
}

// kalibrasi REAL (ambil ukuran saat ini)
function captureCalibration() {
  if (!stableCorners) return;

  let pixelWidth = distance(stableCorners[0], stableCorners[1]);

  let real = prompt("Masukkan panjang asli (cm):");

  scale = real / pixelWidth;

  locked = true;

  document.getElementById("info").innerText = "Terkunci & siap ukur ✔";
}

function unlock(){
  locked=false;
}
</script>

</body>
</html>
