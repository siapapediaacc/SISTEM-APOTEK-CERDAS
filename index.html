<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Germ Hunter - Berburu Kuman!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ===== CAMERA VIDEO ===== */
        #cameraVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }

        /* ===== SCANNER OVERLAY ===== */
        .scanner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background: linear-gradient(
                180deg,
                transparent 0%,
                rgba(0, 255, 100, 0.03) 50%,
                transparent 100%
            );
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 100, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 100, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* ===== HUD ===== */
        .hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 15px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .hud-item {
            text-align: center;
        }

        .hud-label {
            font-size: 11px;
            color: #4cd964;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .hud-health {
            display: flex;
            gap: 3px;
        }

        .health-heart {
            font-size: 20px;
            transition: all 0.3s;
        }

        .health-heart.lost {
            opacity: 0.2;
            filter: grayscale(1);
        }

        /* ===== GAME CANVAS ===== */
        #gameCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            cursor: crosshair;
        }

        /* ===== START SCREEN ===== */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .start-screen.hidden {
            display: none;
        }

        .game-logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .game-title {
            font-size: 32px;
            font-weight: 800;
            color: #4cd964;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(76, 217, 100, 0.5);
        }

        .game-subtitle {
            font-size: 16px;
            color: #888;
            margin-bottom: 40px;
        }

        .start-btn {
            background: #4cd964;
            color: #000;
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(76, 217, 100, 0.4);
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(76, 217, 100, 0.6);
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        .camera-permission-text {
            font-size: 14px;
            color: #888;
            margin-top: 20px;
            line-height: 1.5;
        }

        .simulation-btn {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            padding: 12px 30px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
        }

        /* ===== GAME OVER SCREEN ===== */
        .game-over-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 500;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }

        .game-over-screen.active {
            display: flex;
        }

        .game-over-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .game-over-title {
            font-size: 28px;
            font-weight: 700;
            color: #ff3b30;
            margin-bottom: 10px;
        }

        .game-over-score {
            font-size: 48px;
            font-weight: 800;
            color: #4cd964;
            margin: 20px 0;
        }

        .game-over-stats {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .restart-btn {
            background: #4cd964;
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        /* ===== LEVEL UP NOTIFICATION ===== */
        .level-up {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(76, 217, 100, 0.9);
            color: #000;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: 700;
            z-index: 300;
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }

        .level-up.show {
            transform: translate(-50%, -50%) scale(1);
        }

        /* ===== COMBO TEXT ===== */
        .combo-text {
            position: fixed;
            font-size: 36px;
            font-weight: 800;
            color: #ffcc00;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
            z-index: 200;
            pointer-events: none;
            animation: comboFloat 1s ease-out forwards;
        }

        @keyframes comboFloat {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            z-index: 300;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* ===== PAUSE BUTTON ===== */
        .pause-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== GERM TYPES INFO ===== */
        .germ-info {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 15px;
            opacity: 0.7;
        }

        .germ-type {
            text-align: center;
            font-size: 11px;
        }

        .germ-type-icon {
            font-size: 24px;
        }

        .germ-type-points {
            color: #4cd964;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Camera Video -->
    <video id="cameraVideo" autoplay playsinline muted></video>

    <!-- Scanner Effects -->
    <div class="scanner-overlay"></div>
    <div class="grid-overlay"></div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD -->
    <div class="hud">
        <div class="hud-item">
            <div class="hud-label">Skor</div>
            <div class="hud-value" id="scoreValue">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Level</div>
            <div class="hud-value" id="levelValue">1</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Waktu</div>
            <div class="hud-value" id="timeValue">60</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Nyawa</div>
            <div class="hud-health" id="healthValue">
                <span class="health-heart">❤️</span>
                <span class="health-heart">❤️</span>
                <span class="health-heart">❤️</span>
            </div>
        </div>
    </div>

    <!-- Pause Button -->
    <button class="pause-btn" id="pauseBtn">⏸</button>

    <!-- Germ Types Info -->
    <div class="germ-info" id="germInfo">
        <div class="germ-type">
            <div class="germ-type-icon">🦠</div>
            <div class="germ-type-points">+10</div>
        </div>
        <div class="germ-type">
            <div class="germ-type-icon">🧟</div>
            <div class="germ-type-points">+25</div>
        </div>
        <div class="germ-type">
            <div class="germ-type-icon">👾</div>
            <div class="germ-type-points">+50</div>
        </div>
        <div class="germ-type">
            <div class="germ-type-icon">💀</div>
            <div class="germ-type-points">-1 ❤️</div>
        </div>
    </div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <div class="game-logo">🦠</div>
        <div class="game-title">GERM HUNTER</div>
        <div class="game-subtitle">Berburu Kuman di Dunia Nyata!</div>
        <button class="start-btn" id="startBtn">MULAI BERBURU!</button>
        <div class="camera-permission-text">
            Aplikasi ini memerlukan akses kamera.<br>
            Kuman-kuman virtual akan muncul di layar Anda!<br>
            Ketuk untuk membasmi mereka!
        </div>
        <button class="simulation-btn" id="simBtn">Mode Tanpa Kamera</button>
    </div>

    <!-- Game Over Screen -->
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-icon">🧼</div>
        <div class="game-over-title">BERSIH SELESAI!</div>
        <div class="game-over-score" id="finalScore">0</div>
        <div class="game-over-stats" id="finalStats"></div>
        <button class="restart-btn" id="restartBtn">BERBURU LAGI!</button>
    </div>

    <!-- Level Up -->
    <div class="level-up" id="levelUp">LEVEL UP!</div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== GAME STATE =====
        let score = 0;
        let level = 1;
        let timeLeft = 60;
        let health = 3;
        let gameRunning = false;
        let germs = [];
        let particles = [];
        let combo = 0;
        let lastKillTime = 0;
        let totalGermsKilled = 0;
        let maxCombo = 0;
        let cameraStream = null;
        let isSimulationMode = false;

        // ===== DOM ELEMENTS =====
        const video = document.getElementById('cameraVideo');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreValue = document.getElementById('scoreValue');
        const levelValue = document.getElementById('levelValue');
        const timeValue = document.getElementById('timeValue');
        const healthValue = document.getElementById('healthValue');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScore = document.getElementById('finalScore');
        const finalStats = document.getElementById('finalStats');
        const levelUp = document.getElementById('levelUp');
        const toast = document.getElementById('toast');
        const germInfo = document.getElementById('germInfo');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ===== CAMERA SETUP =====
        async function startCamera() {
            try {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                const constraints = {
                    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
                    audio: false
                };
                cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = cameraStream;
                video.onloadedmetadata = () => video.play();
            } catch (err) {
                console.error('Camera error:', err);
                enableSimulationMode();
            }
        }

        function enableSimulationMode() {
            isSimulationMode = true;
            video.style.display = 'none';
            document.querySelector('.scanner-overlay').style.display = 'none';
            document.querySelector('.grid-overlay').style.display = 'none';

            const simBg = document.createElement('div');
            simBg.id = 'simBg';
            simBg.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: linear-gradient(135deg, #0a1628 0%, #1a2f4a 50%, #0d2137 100%);
                z-index: 1;
            `;
            document.body.insertBefore(simBg, video);

            // Add animated particles to simulation background
            const particleBg = document.createElement('div');
            particleBg.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                z-index: 1; pointer-events: none;
                background-image: radial-gradient(circle at 20% 50%, rgba(76, 217, 100, 0.1) 0%, transparent 50%),
                                  radial-gradient(circle at 80% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 50%),
                                  radial-gradient(circle at 40% 20%, rgba(255, 200, 0, 0.05) 0%, transparent 50%);
            `;
            document.body.insertBefore(particleBg, video);
        }

        // ===== GERM TYPES =====
        const germTypes = [
            { emoji: '🦠', points: 10, speed: 1, size: 40, health: 1, color: '#4cd964', name: 'Bacteria' },
            { emoji: '🧟', points: 25, speed: 1.5, size: 50, health: 2, color: '#ff9500', name: 'Virus' },
            { emoji: '👾', points: 50, speed: 2, size: 55, health: 3, color: '#ff2d55', name: 'Superbug' },
            { emoji: '💀', points: -50, speed: 2.5, size: 45, health: 1, color: '#ff3b30', name: 'Toxic', bad: true }
        ];

        // ===== GERMS CLASS =====
        class Germ {
            constructor() {
                const type = this.selectType();
                this.type = type;
                this.x = Math.random() * (canvas.width - 100) + 50;
                this.y = Math.random() * (canvas.height - 200) + 100;
                this.targetX = this.x;
                this.targetY = this.y;
                this.size = type.size;
                this.speed = type.speed * (1 + level * 0.1);
                this.health = type.health;
                this.maxHealth = type.health;
                this.angle = 0;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.05 + Math.random() * 0.05;
                this.lifeTime = 0;
                this.maxLifeTime = 800 + Math.random() * 400;
                this.scale = 0;
                this.scaleTarget = 1;
                this.dead = false;
                this.pulsePhase = 0;

                // Movement
                this.vx = (Math.random() - 0.5) * this.speed;
                this.vy = (Math.random() - 0.5) * this.speed;
                this.changeDirTimer = 0;
                this.changeDirInterval = 60 + Math.random() * 60;
            }

            selectType() {
                const rand = Math.random();
                if (rand < 0.5) return germTypes[0]; // 50% Bacteria
                if (rand < 0.75) return germTypes[1]; // 25% Virus
                if (rand < 0.9) return germTypes[2]; // 15% Superbug
                return germTypes[3]; // 10% Toxic
            }

            update() {
                this.lifeTime++;
                this.wobble += this.wobbleSpeed;
                this.pulsePhase += 0.1;

                // Spawn animation
                if (this.scale < this.scaleTarget) {
                    this.scale += 0.1;
                    if (this.scale > this.scaleTarget) this.scale = this.scaleTarget;
                }

                // Movement
                this.changeDirTimer++;
                if (this.changeDirTimer >= this.changeDirInterval) {
                    this.vx = (Math.random() - 0.5) * this.speed;
                    this.vy = (Math.random() - 0.5) * this.speed;
                    this.changeDirTimer = 0;
                }

                this.x += this.vx + Math.sin(this.wobble) * 0.5;
                this.y += this.vy + Math.cos(this.wobble) * 0.5;

                // Bounce off edges
                if (this.x < this.size) { this.x = this.size; this.vx *= -1; }
                if (this.x > canvas.width - this.size) { this.x = canvas.width - this.size; this.vx *= -1; }
                if (this.y < this.size + 80) { this.y = this.size + 80; this.vy *= -1; }
                if (this.y > canvas.height - this.size - 100) { this.y = canvas.height - this.size - 100; this.vy *= -1; }

                // Die if lifetime exceeded
                if (this.lifeTime > this.maxLifeTime && !this.type.bad) {
                    this.dead = true;
                    if (!this.type.bad) {
                        loseHealth();
                    }
                }

                this.angle += 0.02;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(this.scale, this.scale);

                // Glow effect
                const glowSize = this.size * 1.5 + Math.sin(this.pulsePhase) * 5;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
                gradient.addColorStop(0, this.type.color + '40');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
                ctx.fill();

                // Health ring for multi-health germs
                if (this.maxHealth > 1) {
                    ctx.strokeStyle = this.type.color + '60';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, 0, Math.PI * 2);
                    ctx.stroke();

                    // Health indicator
                    const healthAngle = (this.health / this.maxHealth) * Math.PI * 2;
                    ctx.strokeStyle = this.type.color;
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * 0.7, -Math.PI / 2, -Math.PI / 2 + healthAngle);
                    ctx.stroke();
                }

                // Main body
                ctx.font = `${this.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type.emoji, 0, 0);

                // Wobble rotation for effect
                ctx.rotate(Math.sin(this.wobble) * 0.2);

                // Points indicator for bad germs
                if (this.type.bad) {
                    ctx.fillStyle = '#ff3b30';
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText('JANGAN!', 0, -this.size * 0.8);
                }

                ctx.restore();
            }

            hit() {
                this.health--;
                if (this.health <= 0) {
                    this.dead = true;
                    return true; // Killed
                }
                // Hit effect - flash
                this.scale = 1.3;
                setTimeout(() => { this.scale = 1; }, 100);
                return false;
            }

            contains(x, y) {
                const dist = Math.sqrt((x - this.x) ** 2 + (y - this.y) ** 2);
                return dist < this.size;
            }
        }

        // ===== PARTICLE SYSTEM =====
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.size = 3 + Math.random() * 5;
                this.color = color;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // Gravity
                this.life -= this.decay;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ===== EXPLOSION EFFECT =====
        function createExplosion(x, y, color, count = 15) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // ===== COMBO TEXT =====
        function showComboText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // ===== GAME FUNCTIONS =====
        function spawnGerm() {
            if (!gameRunning) return;
            const maxGerms = 3 + level * 2;
            if (germs.length < maxGerms) {
                germs.push(new Germ());
            }
            // Spawn rate decreases as level increases
            const spawnDelay = Math.max(500, 2000 - level * 200);
            setTimeout(spawnGerm, spawnDelay);
        }

        function loseHealth() {
            health--;
            updateHealthDisplay();

            // Screen shake effect
            canvas.style.transform = 'translate(5px, 5px)';
            setTimeout(() => canvas.style.transform = 'translate(-5px, -5px)', 50);
            setTimeout(() => canvas.style.transform = 'translate(0, 0)', 100);

            if (health <= 0) {
                gameOver();
            } else {
                showToast(`Kuman lolos! Nyawa tersisa: ${health}`);
            }
        }

        function updateHealthDisplay() {
            let hearts = '';
            for (let i = 0; i < 3; i++) {
                hearts += `<span class="health-heart ${i >= health ? 'lost' : ''}">❤️</span>`;
            }
            healthValue.innerHTML = hearts;
        }

        function updateScore(points) {
            const now = Date.now();
            if (now - lastKillTime < 1500) {
                combo++;
                if (combo > maxCombo) maxCombo = combo;
            } else {
                combo = 1;
            }
            lastKillTime = now;

            const comboMultiplier = Math.min(combo, 5);
            const finalPoints = points * comboMultiplier;
            score += finalPoints;

            scoreValue.textContent = score;

            // Level up check
            const newLevel = Math.floor(score / 200) + 1;
            if (newLevel > level) {
                level = newLevel;
                levelValue.textContent = level;
                showLevelUp();
                timeLeft += 15; // Bonus time
                showToast(`Level ${level}! Bonus waktu +15 detik!`);
            }

            return { combo: comboMultiplier, points: finalPoints };
        }

        function showLevelUp() {
            levelUp.classList.add('show');
            setTimeout(() => levelUp.classList.remove('show'), 1500);
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ===== INPUT HANDLING =====
        function handleInput(e) {
            if (!gameRunning) return;
            e.preventDefault();

            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            let hit = false;

            // Check hits (iterate backwards to hit top germs first)
            for (let i = germs.length - 1; i >= 0; i--) {
                const germ = germs[i];
                if (germ.contains(x, y) && !germ.dead) {
                    hit = true;

                    if (germ.type.bad) {
                        // Toxic germ - lose health immediately
                        loseHealth();
                        createExplosion(germ.x, germ.y, '#ff3b30', 25);
                        showComboText(x, y, '💀 -1 ❤️');
                        germs.splice(i, 1);
                        return;
                    }

                    const killed = germ.hit();

                    if (killed) {
                        // Killed!
                        totalGermsKilled++;
                        const result = updateScore(germ.type.points);
                        createExplosion(germ.x, germ.y, germ.type.color, 20);

                        if (result.combo > 1) {
                            showComboText(x, y, `🔥 COMBO x${result.combo}! +${result.points}`);
                        } else {
                            showComboText(x, y, `+${result.points}`);
                        }

                        germs.splice(i, 1);
                    } else {
                        // Hit but not killed
                        createExplosion(x, y, germ.type.color, 5);
                        showComboText(x, y, '💥');
                    }
                    break; // Only hit one germ per tap
                }
            }

            if (!hit) {
                // Miss effect
                createExplosion(x, y, '#888', 3);
                combo = 0;
            }
        }

        canvas.addEventListener('touchstart', handleInput, {passive: false});
        canvas.addEventListener('mousedown', handleInput);

        // ===== GAME LOOP =====
        let gameLoopId;
        let timerInterval;

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw germs
            for (let i = germs.length - 1; i >= 0; i--) {
                const germ = germs[i];
                germ.update();
                germ.draw();

                if (germ.dead) {
                    if (!germ.type.bad) {
                        // Non-bad germ escaped
                        loseHealth();
                    }
                    germs.splice(i, 1);
                }
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            }

            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameRunning) return;
                timeLeft--;
                timeValue.textContent = timeLeft;

                if (timeLeft <= 10) {
                    timeValue.style.color = '#ff3b30';
                }

                if (timeLeft <= 0) {
                    gameOver();
                }
            }, 1000);
        }

        // ===== START GAME =====
        function startGame() {
            score = 0;
            level = 1;
            timeLeft = 60;
            health = 3;
            germs = [];
            particles = [];
            combo = 0;
            lastKillTime = 0;
            totalGermsKilled = 0;
            maxCombo = 0;
            gameRunning = true;

            scoreValue.textContent = '0';
            levelValue.textContent = '1';
            timeValue.textContent = '60';
            timeValue.style.color = '#fff';
            updateHealthDisplay();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.remove('active');
            germInfo.style.display = 'flex';

            spawnGerm();
            gameLoop();
            startTimer();

            showToast('Berburu dimulai! Ketuk kuman!');
        }

        // ===== GAME OVER =====
        function gameOver() {
            gameRunning = false;
            clearInterval(timerInterval);
            cancelAnimationFrame(gameLoopId);

            finalScore.textContent = score;
            finalStats.innerHTML = `
                Kuman dibasmi: <span style="color:#4cd964">${totalGermsKilled}</span><br>
                Level tertinggi: <span style="color:#4cd964">${level}</span><br>
                Combo maksimal: <span style="color:#ffcc00">x${maxCombo}</span><br>
                Sisa waktu: <span style="color:#4cd964">${timeLeft} detik</span>
            `;

            gameOverScreen.classList.add('active');
            germInfo.style.display = 'none';
        }

        // ===== BUTTON EVENTS =====
        document.getElementById('startBtn').addEventListener('click', () => {
            startCamera().then(() => {
                startGame();
            }).catch(() => {
                enableSimulationMode();
                startGame();
            });
        });

        document.getElementById('simBtn').addEventListener('click', () => {
            enableSimulationMode();
            startGame();
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            startGame();
        });

        // Pause button
        let isPaused = false;
        document.getElementById('pauseBtn').addEventListener('click', () => {
            if (!gameRunning) return;
            isPaused = !isPaused;
            if (isPaused) {
                gameRunning = false;
                clearInterval(timerInterval);
                showToast('PAUSED - Ketuk pause lagi untuk lanjut');
            } else {
                gameRunning = true;
                gameLoop();
                startTimer();
            }
        });

        // ===== INITIALIZE =====
        resizeCanvas();
    </script>
</body>
</html>
