<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Building Measure</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* UI Controls */
        .ui-layer {
            position: absolute;
            z-index: 20;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }

        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 5px;
        }

        .mode-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: #007AFF;
            color: white;
        }

        .flash-btn, .settings-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Measurement Info */
        .measurement-info {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 600;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .unit-toggle {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Crosshair */
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            pointer-events: none;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.8);
        }

        .crosshair::before {
            width: 2px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        .crosshair::after {
            width: 100%;
            height: 2px;
            top: 50%;
            transform: translateY(-50%);
        }

        .crosshair-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #007AFF;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0,122,255,0.8);
        }

        /* Bottom Controls */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            pointer-events: auto;
        }

        .action-buttons {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .capture-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: white;
            border: 4px solid rgba(255,255,255,0.5);
            cursor: pointer;
            position: relative;
            transition: transform 0.1s;
        }

        .capture-btn:active {
            transform: scale(0.95);
        }

        .capture-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
        }

        .capture-btn.recording::after {
            background: #ff3b30;
            border-radius: 8px;
            width: 30px;
            height: 30px;
        }

        .undo-btn, .clear-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .undo-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Point markers on canvas */
        .point-marker {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid #007AFF;
            border-radius: 50%;
            background: rgba(0,122,255,0.3);
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(0,122,255,0.5);
        }

        .point-label {
            position: absolute;
            background: rgba(0,122,255,0.9);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            transform: translate(-50%, -150%);
            white-space: nowrap;
            z-index: 16;
        }

        /* Measurement line label */
        .distance-label {
            position: absolute;
            background: rgba(0,0,0,0.7);
            color: #34C759;
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            transform: translate(-50%, -50%);
            z-index: 16;
            white-space: nowrap;
            border: 2px solid #34C759;
        }

        /* Level indicator */
        .level-indicator {
            position: absolute;
            top: 140px;
            right: 20px;
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .level-bubble {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            position: relative;
        }

        .level-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #34C759;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }

        /* Calibration modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1c1c1e;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            color: white;
        }

        .modal-title {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .calibration-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .modal-btn.primary {
            background: #007AFF;
            color: white;
        }

        .modal-btn.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Instructions */
        .instructions {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            opacity: 0.8;
        }

        /* Saved measurements list */
        .measurements-list {
            position: absolute;
            top: 50%;
            right: -300px;
            transform: translateY(-50%);
            width: 280px;
            max-height: 60vh;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px 0 0 20px;
            padding: 20px;
            overflow-y: auto;
            transition: right 0.3s;
            z-index: 30;
            pointer-events: auto;
        }

        .measurements-list.active {
            right: 0;
        }

        .measurements-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .measurements-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
        }

        .close-list {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .measurement-item {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .measurement-value {
            font-size: 18px;
            font-weight: 700;
            color: #34C759;
        }

        .measurement-time {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }

        .history-btn {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            z-index: 20;
        }

        /* Toast notification */
        .toast {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            color: white;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 380px) {
            .mode-selector {
                transform: scale(0.9);
            }
            .capture-btn {
                width: 60px;
                height: 60px;
            }
            .capture-btn::after {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>

    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>Memuat kamera...</p>
        <p style="font-size: 12px; margin-top: 10px; opacity: 0.7;">Izinkan akses kamera untuk melanjutkan</p>
    </div>

    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>

        <!-- UI Layer -->
        <div class="ui-layer">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="distance">Jarak</button>
                    <button class="mode-btn" data-mode="area">Area</button>
                    <button class="mode-btn" data-mode="level">Level</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="flash-btn" id="flashBtn">⚡</button>
                    <button class="settings-btn" id="settingsBtn">⚙️</button>
                </div>
            </div>

            <!-- Measurement Info -->
            <div class="measurement-info" id="measurementInfo">
                <span id="currentMeasurement">0.00 m</span>
                <button class="unit-toggle" id="unitToggle">m</button>
            </div>

            <!-- History Button -->
            <button class="history-btn" id="historyBtn">📋</button>

            <!-- Level Indicator -->
            <div class="level-indicator" id="levelIndicator" style="display: none;">
                <div class="level-bubble">
                    <div class="level-dot" id="levelDot"></div>
                </div>
            </div>

            <!-- Crosshair -->
            <div class="crosshair" id="crosshair">
                <div class="crosshair-dot"></div>
            </div>

            <!-- Instructions -->
            <div class="instructions" id="instructions">
                Ketuk layar untuk menandai titik pertama
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <div class="action-buttons">
                    <button class="undo-btn" id="undoBtn" disabled>↩️</button>
                    <button class="capture-btn" id="captureBtn"></button>
                    <button class="clear-btn" id="clearBtn">🗑️</button>
                </div>
            </div>
        </div>

        <!-- Measurements List -->
        <div class="measurements-list" id="measurementsList">
            <div class="measurements-header">
                <span class="measurements-title">Riwayat Pengukuran</span>
                <button class="close-list" id="closeList">✕</button>
            </div>
            <div id="measurementsContent"></div>
        </div>

        <!-- Calibration Modal -->
        <div class="modal" id="calibrationModal">
            <div class="modal-content">
                <h3 class="modal-title">Kalibrasi Manual</h3>
                <p style="margin-bottom: 15px; font-size: 14px; opacity: 0.8;">
                    Masukkan jarak nyata ke objek (dalam meter) untuk kalibrasi:
                </p>
                <input type="number" class="calibration-input" id="calibrationInput" 
                       placeholder="Contoh: 2.5" step="0.1" min="0.1">
                <div class="modal-buttons">
                    <button class="modal-btn secondary" id="cancelCalibration">Batal</button>
                    <button class="modal-btn primary" id="confirmCalibration">OK</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <script>
        // Application State
        const state = {
            mode: 'distance', // distance, area, level
            unit: 'm', // m, cm, ft, in
            points: [],
            measurements: [],
            isCalibrated: false,
            calibrationFactor: 1,
            currentDistance: 0,
            isMeasuring: false,
            stream: null,
            deviceOrientation: { alpha: 0, beta: 0, gamma: 0 }
        };

        // DOM Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const loading = document.getElementById('loading');
        const crosshair = document.getElementById('crosshair');
        const instructions = document.getElementById('instructions');
        const currentMeasurementEl = document.getElementById('currentMeasurement');
        const unitToggle = document.getElementById('unitToggle');
        const measurementsList = document.getElementById('measurementsList');
        const measurementsContent = document.getElementById('measurementsContent');
        const toast = document.getElementById('toast');

        // Initialize Camera
        async function initCamera() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };

                state.stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = state.stream;
                
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    loading.style.display = 'none';
                    showToast('Kamera siap! Ketuk untuk mulai mengukur');
                };
            } catch (err) {
                console.error('Camera error:', err);
                loading.innerHTML = `
                    <p style="color: #ff3b30;">Gagal mengakses kamera</p>
                    <p style="font-size: 14px; margin-top: 10px;">
                        Pastikan Anda memberikan izin kamera dan menggunakan HTTPS
                    </p>
                `;
            }
        }

        // Device Orientation for Level
        function initOrientation() {
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientation', (e) => {
                    state.deviceOrientation = {
                        alpha: e.alpha || 0,
                        beta: e.beta || 0,
                        gamma: e.gamma || 0
                    };
                    
                    if (state.mode === 'level') {
                        updateLevelIndicator();
                    }
                });
            }
        }

        function updateLevelIndicator() {
            const dot = document.getElementById('levelDot');
            const beta = state.deviceOrientation.beta;
            const gamma = state.deviceOrientation.gamma;
            
            // Map orientation to bubble position
            const x = Math.max(-25, Math.min(25, gamma));
            const y = Math.max(-25, Math.min(25, beta));
            
            dot.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            
            // Check if level
            if (Math.abs(beta) < 2 && Math.abs(gamma) < 2) {
                dot.style.background = '#34C759';
            } else {
                dot.style.background = '#ff9500';
            }
        }

        // Measurement Functions
        function getDistance(p1, p2) {
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function pixelsToUnit(pixels) {
            // Convert pixels to real units based on calibration
            // This is a simplified calculation - in real AR, you'd use device sensors
            const baseScale = 0.001; // Approximate scale factor
            const value = pixels * baseScale * state.calibrationFactor;
            
            if (state.unit === 'cm') return value * 100;
            if (state.unit === 'ft') return value * 3.28084;
            if (state.unit === 'in') return value * 39.3701;
            return value; // meters
        }

        function formatValue(value) {
            if (state.unit === 'cm') return value.toFixed(1);
            if (state.unit === 'ft' || state.unit === 'in') return value.toFixed(2);
            return value.toFixed(2);
        }

        function getUnitLabel() {
            const labels = { m: 'm', cm: 'cm', ft: 'ft', in: 'in' };
            return labels[state.unit];
        }

        // Drawing Functions
        function drawLine(p1, p2, color = '#007AFF', width = 3) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
        }

        function drawPoint(x, y, label = '') {
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 122, 255, 0.3)';
            ctx.fill();
            ctx.strokeStyle = '#007AFF';
            ctx.lineWidth = 3;
            ctx.stroke();

            if (label) {
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, x, y - 15);
            }
        }

        function drawMeasurementLabel(p1, p2, distance) {
            const midX = (p1.x + p2.x) / 2;
            const midY = (p1.y + p2.y) / 2;
            const value = formatValue(pixelsToUnit(distance));
            const label = `${value} ${getUnitLabel()}`;

            // Background for text
            ctx.font = 'bold 18px sans-serif';
            const textWidth = ctx.measureText(label).width;
            
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.beginPath();
            ctx.roundRect(midX - textWidth/2 - 10, midY - 15, textWidth + 20, 30, 15);
            ctx.fill();

            ctx.fillStyle = '#34C759';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(label, midX, midY);
        }

        function drawArea() {
            if (state.points.length < 3) return;

            ctx.beginPath();
            ctx.moveTo(state.points[0].x, state.points[0].y);
            for (let i = 1; i < state.points.length; i++) {
                ctx.lineTo(state.points[i].x, state.points[i].y);
            }
            ctx.closePath();
            
            ctx.fillStyle = 'rgba(0, 122, 255, 0.2)';
            ctx.fill();
            ctx.strokeStyle = '#007AFF';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Calculate and display area
            let area = 0;
            for (let i = 0; i < state.points.length; i++) {
                const j = (i + 1) % state.points.length;
                area += state.points[i].x * state.points[j].y;
                area -= state.points[j].x * state.points[i].y;
            }
            area = Math.abs(area) / 2;
            
            // Convert to square units
            const scale = 0.001 * state.calibrationFactor;
            let areaValue = area * scale * scale;
            
            if (state.unit === 'cm') areaValue *= 10000;
            if (state.unit === 'ft') areaValue *= 10.764;
            if (state.unit === 'in') areaValue *= 1550;
            
            const unit2 = state.unit === 'm' ? 'm²' : 
                         state.unit === 'cm' ? 'cm²' : 
                         state.unit === 'ft' ? 'ft²' : 'in²';
            
            const centroid = getCentroid(state.points);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.beginPath();
            ctx.arc(centroid.x, centroid.y, 40, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#34C759';
            ctx.font = 'bold 16px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`${areaValue.toFixed(2)} ${unit2}`, centroid.x, centroid.y);
        }

        function getCentroid(points) {
            let x = 0, y = 0;
            points.forEach(p => { x += p.x; y += p.y; });
            return { x: x / points.length, y: y / points.length };
        }

        function redrawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw lines between points
            for (let i = 0; i < state.points.length - 1; i++) {
                const p1 = state.points[i];
                const p2 = state.points[i + 1];
                drawLine(p1, p2);
                
                const dist = getDistance(p1, p2);
                drawMeasurementLabel(p1, p2, dist);
            }

            // Draw points
            state.points.forEach((p, i) => {
                drawPoint(p.x, p.y, `${i + 1}`);
            });

            // Draw area if in area mode and has 3+ points
            if (state.mode === 'area' && state.points.length >= 3) {
                drawArea();
            }

            // Draw current line being measured
            if (state.isMeasuring && state.points.length > 0) {
                const lastPoint = state.points[state.points.length - 1];
                // Get mouse/touch position relative to canvas
                // This would need current pointer position
            }
        }

        // Interaction Handlers
        function handleTap(e) {
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            // Scale to canvas resolution
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const point = {
                x: x * scaleX,
                y: y * scaleY,
                id: Date.now()
            };

            if (state.mode === 'level') return;

            if (state.mode === 'distance') {
                if (state.points.length >= 2) {
                    // Save current measurement and start new
                    saveMeasurement();
                    state.points = [point];
                    instructions.textContent = 'Ketik titik kedua untuk mengukur jarak';
                } else if (state.points.length === 0) {
                    state.points.push(point);
                    instructions.textContent = 'Ketik titik kedua untuk mengukur jarak';
                } else {
                    state.points.push(point);
                    const dist = getDistance(state.points[0], state.points[1]);
                    state.currentDistance = dist;
                    currentMeasurementEl.textContent = 
                        `${formatValue(pixelsToUnit(dist))} ${getUnitLabel()}`;
                    instructions.textContent = 'Ketik lagi untuk mengukur jarak baru';
                    
                    // Auto-save after a delay
                    setTimeout(() => saveMeasurement(), 500);
                }
            } else if (state.mode === 'area') {
                state.points.push(point);
                if (state.points.length >= 3) {
                    instructions.textContent = 'Ketik untuk menambah titik, atau ketuk tombol capture untuk selesai';
                } else {
                    instructions.textContent = `Ketik titik ${state.points.length + 1} (minimal 3)`;
                }
            }

            redrawCanvas();
            updateUI();
        }

        function saveMeasurement() {
            if (state.points.length < 2) return;

            let value, type;
            
            if (state.mode === 'distance') {
                const dist = getDistance(state.points[0], state.points[1]);
                value = pixelsToUnit(dist);
                type = 'Jarak';
            } else if (state.mode === 'area' && state.points.length >= 3) {
                let area = 0;
                for (let i = 0; i < state.points.length; i++) {
                    const j = (i + 1) % state.points.length;
                    area += state.points[i].x * state.points[j].y;
                    area -= state.points[j].x * state.points[i].y;
                }
                area = Math.abs(area) / 2;
                const scale = 0.001 * state.calibrationFactor;
                value = area * scale * scale;
                if (state.unit === 'cm') value *= 10000;
                if (state.unit === 'ft') value *= 10.764;
                if (state.unit === 'in') value *= 1550;
                type = 'Area';
            }

            const measurement = {
                id: Date.now(),
                type,
                value: formatValue(value),
                unit: state.unit === 'm' ? (type === 'Area' ? 'm²' : 'm') :
                      state.unit === 'cm' ? (type === 'Area' ? 'cm²' : 'cm') :
                      state.unit === 'ft' ? (type === 'Area' ? 'ft²' : 'ft') :
                      (type === 'Area' ? 'in²' : 'in'),
                timestamp: new Date().toLocaleTimeString('id-ID'),
                points: [...state.points]
            };

            state.measurements.unshift(measurement);
            updateMeasurementsList();
            showToast(`${type} tersimpan: ${measurement.value} ${measurement.unit}`);
        }

        function updateMeasurementsList() {
            measurementsContent.innerHTML = state.measurements.map(m => `
                <div class="measurement-item">
                    <div>
                        <div style="font-size: 14px; margin-bottom: 4px;">${m.type}</div>
                        <div class="measurement-time">${m.timestamp}</div>
                    </div>
                    <div class="measurement-value">${m.value} ${m.unit}</div>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('undoBtn').disabled = state.points.length === 0;
        }

        // Event Listeners
        canvas.addEventListener('click', handleTap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        }, { passive: false });

        // Mode Selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;
                
                // Reset points when changing mode
                state.points = [];
                redrawCanvas();
                
                if (state.mode === 'level') {
                    crosshair.style.display = 'none';
                    instructions.textContent = 'Gunakan sebagai waterpas digital';
                    document.getElementById('levelIndicator').style.display = 'flex';
                    currentMeasurementEl.textContent = 'Level';
                } else {
                    crosshair.style.display = 'block';
                    document.getElementById('levelIndicator').style.display = 'none';
                    instructions.textContent = state.mode === 'distance' 
                        ? 'Ketuk layar untuk menandai titik pertama' 
                        : 'Ketuk layar untuk menandai sudut area';
                }
            });
        });

        // Unit Toggle
        unitToggle.addEventListener('click', () => {
            const units = ['m', 'cm', 'ft', 'in'];
            const currentIndex = units.indexOf(state.unit);
            state.unit = units[(currentIndex + 1) % units.length];
            unitToggle.textContent = getUnitLabel();
            
            // Update current display
            if (state.points.length >= 2 && state.mode === 'distance') {
                const dist = getDistance(state.points[0], state.points[1]);
                currentMeasurementEl.textContent = 
                    `${formatValue(pixelsToUnit(dist))} ${getUnitLabel()}`;
            }
            redrawCanvas();
        });

        // Capture Button
        document.getElementById('captureBtn').addEventListener('click', () => {
            if (state.mode === 'area' && state.points.length >= 3) {
                saveMeasurement();
                state.points = [];
                redrawCanvas();
                instructions.textContent = 'Area tersimpan! Ketuk untuk mengukur area baru';
            } else if (state.mode === 'distance' && state.points.length === 2) {
                saveMeasurement();
            } else {
                // Take photo with overlay
                takeScreenshot();
            }
        });

        // Undo Button
        document.getElementById('undoBtn').addEventListener('click', () => {
            state.points.pop();
            redrawCanvas();
            updateUI();
            
            if (state.points.length === 0) {
                instructions.textContent = 'Ketuk layar untuk memulai';
            }
        });

        // Clear Button
        document.getElementById('clearBtn').addEventListener('click', () => {
            state.points = [];
            redrawCanvas();
            updateUI();
            currentMeasurementEl.textContent = `0.00 ${getUnitLabel()}`;
            instructions.textContent = 'Ketuk layar untuk memulai';
        });

        // Flash Button (toggle torch if available)
        document.getElementById('flashBtn').addEventListener('click', async () => {
            if (!state.stream) return;
            
            const track = state.stream.getVideoTracks()[0];
            try {
                const capabilities = track.getCapabilities();
                if (capabilities.torch) {
                    const settings = track.getSettings();
                    await track.applyConstraints({
                        advanced: [{ torch: !settings.torch }]
                    });
                    showToast(settings.torch ? 'Flash mati' : 'Flash menyala');
                } else {
                    showToast('Flash tidak didukung di perangkat ini');
                }
            } catch (err) {
                showToast('Gagal mengontrol flash');
            }
        });

        // Settings / Calibration
        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('calibrationModal').classList.add('active');
        });

        document.getElementById('cancelCalibration').addEventListener('click', () => {
            document.getElementById('calibrationModal').classList.remove('active');
        });

        document.getElementById('confirmCalibration').addEventListener('click', () => {
            const value = parseFloat(document.getElementById('calibrationInput').value);
            if (value && value > 0) {
                // Calculate calibration factor based on current view
                // This is simplified - in real app you'd use known reference
                state.calibrationFactor = value / 2; // Assuming average distance
                state.isCalibrated = true;
                showToast('Kalibrasi berhasil!');
                document.getElementById('calibrationModal').classList.remove('active');
            }
        });

        // History
        document.getElementById('historyBtn').addEventListener('click', () => {
            measurementsList.classList.add('active');
        });

        document.getElementById('closeList').addEventListener('click', () => {
            measurementsList.classList.remove('active');
        });

        // Utility Functions
        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function takeScreenshot() {
            // Create temporary canvas to combine video and overlay
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            
            // Draw video frame
            tempCtx.drawImage(video, 0, 0);
            
            // Draw overlay
            tempCtx.drawImage(canvas, 0, 0);
            
            // Save
            const link = document.createElement('a');
            link.download = `measurement_${Date.now()}.jpg`;
            link.href = tempCanvas.toDataURL('image/jpeg', 0.9);
            link.click();
            
            showToast('Foto tersimpan!');
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = video.videoWidth || window.innerWidth;
            canvas.height = video.videoHeight || window.innerHeight;
            redrawCanvas();
        });

        // Initialize
        initCamera();
        initOrientation();

        // Prevent zoom on double tap
        let lastTouchEnd = 0;
        document.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });

        // Prevent context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
