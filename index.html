<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Measure</title>
<style>
body { margin:0; overflow:hidden; }
#info {
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  background:rgba(0,0,0,0.5);
  padding:10px;
}
</style>
</head>
<body>

<div id="info">Tap 2 titik untuk ukur</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js";
import { ARButton } from "https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/webxr/ARButton.js";

let camera, scene, renderer;
let points = [];

init();

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera();

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);
  document.body.appendChild(ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test']
  }));

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  const controller = renderer.xr.getController(0);
  controller.addEventListener("select", onSelect);
  scene.add(controller);

  renderer.setAnimationLoop(render);
}

let hitTestSource = null;
let hitTestSourceRequested = false;

function onSelect() {

  if (!currentHit) return;

  let pos = new THREE.Vector3();
  pos.setFromMatrixPosition(currentHit.getPose(referenceSpace).transform.matrix);

  points.push(pos);

  if (points.length >= 2) {
    let d = points[0].distanceTo(points[1]);

    document.getElementById("info").innerText =
      "Jarak: " + (d * 100).toFixed(2) + " cm";

    drawLine(points[0], points[1]);
    points = [];
  }
}

function drawLine(p1, p2) {
  const material = new THREE.LineBasicMaterial({ color: 0x00ff00 });

  const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);

  const line = new THREE.Line(geometry, material);
  scene.add(line);
}

let currentHit = null;
let referenceSpace;

function render(timestamp, frame) {

  if (frame) {

    const session = renderer.xr.getSession();

    if (!hitTestSourceRequested) {

      session.requestReferenceSpace('viewer').then((refSpace) => {
        session.requestHitTestSource({ space: refSpace }).then((source) => {
          hitTestSource = source;
        });
      });

      session.requestReferenceSpace('local').then((refSpace) => {
        referenceSpace = refSpace;
      });

      hitTestSourceRequested = true;
    }

    if (hitTestSource) {

      const hitTestResults = frame.getHitTestResults(hitTestSource);

      if (hitTestResults.length) {
        currentHit = hitTestResults[0];
      }
    }
  }

  renderer.render(scene, camera);
}
</script>

</body>
</html>
