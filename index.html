<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteran Digital Akurat</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f9; margin: 0; padding: 20px; }
        .container { position: relative; display: inline-block; margin-top: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        video, canvas { display: block; border-radius: 8px; }
        canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        button { padding: 10px 20px; border: none; border-radius: 5px; background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.active { background: #28a745; }
        .info-panel { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; border: 1px solid #ccc; max-width: 500px; margin-left: auto; margin-right: auto; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>

    <h2>Meteran Digital Kamera</h2>
    <p>Gunakan KTP/Kartu ATM sebagai referensi (Panjang standar 8.56 cm).</p>

    <div class="controls">
        <button id="btnCapture" onclick="captureImage()">1. Ambil Gambar</button>
        <button id="btnCalibrate" onclick="setMode('calibrate')" disabled>2. Kalibrasi (Ukur KTP)</button>
        <button id="btnLength" onclick="setMode('length')" disabled>3. Ukur Panjang</button>
        <button id="btnArea" onclick="setMode('area')" disabled>4. Ukur Luas (Kotak)</button>
        <button onclick="resetCanvas()">Reset Garis</button>
    </div>

    <div class="container" id="mediaContainer">
        <video id="camera" width="640" height="480" autoplay playsinline></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div class="info-panel">
        <h3>Hasil Pengukuran</h3>
        <p id="status">Status: Kamera aktif. Harap letakkan benda & KTP, lalu "Ambil Gambar".</p>
        <p><strong>Skala Referensi:</strong> <span id="scaleValue">-</span> cm/px</p>
        <p><strong>Panjang Benda:</strong> <span id="lengthValue">-</span> cm</p>
        <p><strong>Luas Benda:</strong> <span id="areaValue">-</span> cm²</p>
    </div>

    <script>
        const video = document.getElementById('camera');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        
        let mode = 'idle'; // idle, calibrate, length, area
        let points = [];
        let imageCaptured = false;
        let scaleCmPerPx = 0;
        const REFERENCE_REAL_WIDTH_CM = 8.56; // Panjang standar KTP/ATM

        // Inisialisasi Kamera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { alert("Error akses kamera: " + err); });

        function captureImage() {
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            video.pause();
            imageCaptured = true;
            document.getElementById('status').innerText = "Status: Gambar ditangkap. Pilih 'Kalibrasi' untuk mulai.";
            document.getElementById('btnCalibrate').disabled = false;
            document.getElementById('btnCapture').innerText = "Ulangi Kamera";
            document.getElementById('btnCapture').onclick = restartCamera;
        }

        function restartCamera() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            video.play();
            imageCaptured = false;
            scaleCmPerPx = 0;
            resetCanvas();
            document.getElementById('status').innerText = "Status: Kamera aktif.";
            document.getElementById('btnCapture').innerText = "1. Ambil Gambar";
            document.getElementById('btnCapture').onclick = captureImage;
            disableButtons();
        }

        function disableButtons() {
            document.getElementById('btnCalibrate').disabled = true;
            document.getElementById('btnLength').disabled = true;
            document.getElementById('btnArea').disabled = true;
        }

        function setMode(newMode) {
            if (!imageCaptured) return alert("Ambil gambar terlebih dahulu!");
            mode = newMode;
            points = [];
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + newMode.charAt(0).toUpperCase() + newMode.slice(1)).classList.add('active');
            
            let statusText = "";
            if(mode === 'calibrate') statusText = "Klik 2 ujung pada kartu KTP untuk kalibrasi.";
            if(mode === 'length') statusText = "Klik 2 ujung pada benda target untuk mengukur panjangnya.";
            if(mode === 'area') statusText = "Klik 2 ujung diagonal pada benda target untuk mengukur luas (persegi panjang).";
            document.getElementById('status').innerText = "Status: " + statusText;
        }

        function resetCanvas() {
            points = [];
            if (imageCaptured) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height); // Restore image
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if (mode === 'idle' || !imageCaptured) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            points.push({x, y});
            drawPoint(x, y);

            if (points.length === 2) {
                drawLine(points[0], points[1]);
                processMeasurement();
                points = []; // Reset for next measurement
            }
        });

        function drawPoint(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, 2 * Math.PI);
            ctx.fillStyle = "red";
            ctx.fill();
        }

        function drawLine(p1, p2) {
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = "yellow";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function processMeasurement() {
            const p1 = points[0];
            const p2 = points[1];
            // Rumus Euclidean Distance
            const pixelDistance = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));

            if (mode === 'calibrate') {
                scaleCmPerPx = REFERENCE_REAL_WIDTH_CM / pixelDistance;
                document.getElementById('scaleValue').innerText = scaleCmPerPx.toFixed(5);
                document.getElementById('btnLength').disabled = false;
                document.getElementById('btnArea').disabled = false;
                document.getElementById('status').innerText = "Status: Kalibrasi sukses. Silakan ukur benda target.";
            } 
            else if (mode === 'length') {
                if (scaleCmPerPx === 0) return alert("Harap kalibrasi KTP terlebih dahulu!");
                const realLengthCm = pixelDistance * scaleCmPerPx;
                document.getElementById('lengthValue').innerText = realLengthCm.toFixed(2);
                drawText(realLengthCm.toFixed(2) + " cm", (p1.x + p2.x)/2, (p1.y + p2.y)/2);
            }
            else if (mode === 'area') {
                if (scaleCmPerPx === 0) return alert("Harap kalibrasi KTP terlebih dahulu!");
                const pixelWidth = Math.abs(p2.x - p1.x);
                const pixelHeight = Math.abs(p2.y - p1.y);
                // Area = (width_px * scale) * (height_px * scale)
                const realAreaCm2 = (pixelWidth * scaleCmPerPx) * (pixelHeight * scaleCmPerPx);
                
                // Draw bounding box
                ctx.beginPath();
                ctx.rect(Math.min(p1.x, p2.x), Math.min(p1.y, p2.y), pixelWidth, pixelHeight);
                ctx.strokeStyle = "rgba(0, 255, 0, 0.6)";
                ctx.lineWidth = 2;
                ctx.stroke();

                document.getElementById('areaValue').innerText = realAreaCm2.toFixed(2);
                drawText(realAreaCm2.toFixed(2) + " cm²", (p1.x + p2.x)/2, (p1.y + p2.y)/2);
            }
        }

        function drawText(text, x, y) {
            ctx.font = "16px Arial";
            ctx.fillStyle = "white";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText(text, x + 10, y - 10);
            ctx.shadowBlur = 0; // reset
        }
    </script>
</body>
</html>
