<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Meteran Digital AI (KTP)</title>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>
<style>
body { margin:0; background:#000; color:#0f0; font-family:Arial; }
#canvas { position:absolute; top:0; left:0; }
#ui {
  position:fixed; bottom:10px; left:10px;
}
button {
  padding:10px; margin:5px;
  font-size:14px;
}
</style>
</head>
<body>

<video id="video" autoplay playsinline style="display:none;"></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <button onclick="startCalibration()">Scan KTP</button>
  <button onclick="measureMode()">Mode Ukur</button>
  <button onclick="resetPoints()">Reset</button>
  <div id="info">Status: Idle</div>
</div>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');

let scale = 0;
let points = [];
let measuring = false;

// START CAMERA
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  video.srcObject = stream;
  video.play();
});

// LOOP
function processFrame() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  if (typeof cv !== 'undefined') {
    let src = cv.imread(canvas);
    let gray = new cv.Mat();
    let edges = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.Canny(gray, edges, 50, 150);

    let contours = new cv.MatVector();
    let hierarchy = new cv.Mat();

    cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    let maxArea = 0;
    let bestRect = null;

    for (let i = 0; i < contours.size(); i++) {
      let cnt = contours.get(i);
      let area = cv.contourArea(cnt);

      if (area > maxArea) {
        let approx = new cv.Mat();
        cv.approxPolyDP(cnt, approx, 0.02 * cv.arcLength(cnt, true), true);

        if (approx.rows === 4) {
          maxArea = area;
          bestRect = approx;
        }
      }
    }

    if (bestRect && !scale) {
      drawRect(bestRect);

      let width = distance(
        bestRect.data32S[0], bestRect.data32S[1],
        bestRect.data32S[2], bestRect.data32S[3]
      );

      scale = width / 8.56; // cm
      document.getElementById('info').innerText = "Skala terdeteksi";
    }

    src.delete(); gray.delete(); edges.delete();
    contours.delete(); hierarchy.delete();
  }

  drawPoints();

  requestAnimationFrame(processFrame);
}

function drawRect(rect) {
  ctx.strokeStyle = "lime";
  ctx.lineWidth = 3;

  for (let i = 0; i < 4; i++) {
    let x1 = rect.data32S[i*2];
    let y1 = rect.data32S[i*2+1];
    let x2 = rect.data32S[((i+1)%4)*2];
    let y2 = rect.data32S[((i+1)%4)*2+1];

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
}

function startCalibration() {
  scale = 0;
  document.getElementById('info').innerText = "Scanning KTP...";
}

function measureMode() {
  measuring = true;
  document.getElementById('info').innerText = "Mode Ukur Aktif";
}

canvas.addEventListener('click', function(e) {
  if (!measuring || !scale) return;

  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  points.push({x,y});
});

function drawPoints() {
  ctx.fillStyle = "red";

  for (let p of points) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.fill();
  }

  if (points.length >= 2 && scale) {
    let p1 = points[points.length-2];
    let p2 = points[points.length-1];

    let d = distance(p1.x, p1.y, p2.x, p2.y);
    let cm = d / scale;

    ctx.fillStyle = "yellow";
    ctx.fillText(cm.toFixed(2) + " cm", p2.x+10, p2.y);
  }
}

function distance(x1,y1,x2,y2){
  return Math.sqrt((x2-x1)**2 + (y2-y1)**2);
}

function resetPoints(){
  points = [];
}

video.addEventListener('play', processFrame);
</script>

</body>
</html>
