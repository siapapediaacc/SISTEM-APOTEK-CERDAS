<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Measure Debug</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2"></script>

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }

video, canvas {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}

canvas { z-index:2; }
video { z-index:1; }

.ui {
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:999;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius:15px;
}

button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:10px;
}

.status {
  position:fixed;
  top:10px;
  width:100%;
  text-align:center;
  z-index:999;
}
</style>
</head>

<body>

<div class="status" id="status">Klik layar untuk mulai</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<div class="ui">
  <button onclick="startApp()">START</button>
</div>

<script>
let video = document.getElementById("video");
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");
let statusText = document.getElementById("status");

let model;
let running = false;

// WAJIB: trigger manual
async function startApp() {
  statusText.innerText = "Mengaktifkan kamera...";

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" }
    });
    video.srcObject = stream;

    video.onloadedmetadata = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    };

    statusText.innerText = "Load AI model...";
    model = await cocoSsd.load();

    statusText.innerText = "AI aktif ✔";
    running = true;
    detect();

  } catch (e) {
    statusText.innerText = "ERROR: " + e.message;
  }
}

async function detect() {
  if (!running) return;

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  try {
    const predictions = await model.detect(video);

    predictions.forEach(p => {
      if (p.score > 0.6) {
        let [x, y, w, h] = p.bbox;

        ctx.strokeStyle = "lime";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = "lime";
        ctx.font = "16px Arial";
        ctx.fillText(p.class, x, y - 5);
      }
    });

    statusText.innerText = "Objek terdeteksi: " + predictions.length;

  } catch (err) {
    statusText.innerText = "Deteksi error";
  }

  requestAnimationFrame(detect);
}
</script>

</body>
</html>
