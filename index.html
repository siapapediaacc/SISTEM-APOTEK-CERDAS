<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Germ Hunter AR</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
body{background:#000;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh;width:100vw}
#cam{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;background:#000}
#cv{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10}
.hud{position:fixed;top:0;left:0;right:0;padding:10px 15px;z-index:100;display:flex;justify-content:space-between;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);font-size:12px}
.hud-item{text-align:center}
.hud-label{color:#4cd964;font-size:10px;text-transform:uppercase}
.hud-value{font-size:20px;font-weight:700}
.ss{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.ss.hidden{display:none}
.ss h1{font-size:36px;color:#4cd964;margin-bottom:10px}
.ss p{color:#888;margin-bottom:5px;font-size:14px}
.btn{background:#4cd964;color:#000;border:none;padding:15px 40px;border-radius:25px;font-size:18px;font-weight:700;cursor:pointer;margin:10px}
.btn2{background:transparent;color:#888;border:1px solid #444;padding:10px 25px;border-radius:20px;font-size:13px;cursor:pointer}
.gos{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:600;display:none;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center}
.gos.active{display:flex}
.gos h2{font-size:28px;color:#ff3b30;margin-bottom:10px}
.gos .sc{font-size:48px;color:#4cd964;font-weight:800;margin:15px 0}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.lvl{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:#4cd964;color:#000;padding:15px 30px;border-radius:10px;font-size:22px;font-weight:700;z-index:300;transition:transform 0.4s;pointer-events:none}
.lvl.show{transform:translate(-50%,-50%) scale(1)}
.combo{position:fixed;font-size:28px;font-weight:800;color:#ffcc00;text-shadow:0 0 15px rgba(255,204,0,0.8);z-index:200;pointer-events:none;animation:cf 1s ease-out forwards}
@keyframes cf{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
.info{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:12px;opacity:0.7;background:rgba(0,0,0,0.5);padding:6px 12px;border-radius:15px;font-size:10px}
.info div{text-align:center}
</style>
</head>
<body>
<video id="cam" autoplay playsinline muted></video>
<canvas id="cv"></canvas>
<div class="hud" id="hud" style="display:none">
<div class="hud-item"><div class="hud-label">Skor</div><div class="hud-value" id="sc">0</div></div>
<div class="hud-item"><div class="hud-label">Level</div><div class="hud-value" id="lv">1</div></div>
<div class="hud-item"><div class="hud-label">Waktu</div><div class="hud-value" id="tm">60</div></div>
<div class="hud-item"><div class="hud-label">Nyawa</div><div class="hud-value" id="hp">❤️❤️❤️</div></div>
</div>
<div class="ss" id="ss">
<div style="font-size:60px;margin-bottom:15px">🦠</div>
<h1>GERM HUNTER</h1>
<p style="margin-bottom:20px">AR Gyroscope Edition</p>
<p style="font-size:13px;color:#aaa;margin-bottom:25px">Gerakkan HP untuk mencari kuman<br>Ketuk untuk membasmi!</p>
<button class="btn" id="st">MULAI!</button>
<button class="btn2" id="sim">Mode Tanpa Kamera</button>
</div>
<div class="gos" id="gos">
<div style="font-size:50px;margin-bottom:10px">🧼</div>
<h2>SELESAI!</h2>
<div class="sc" id="fs">0</div>
<div style="color:#888;font-size:14px;margin-bottom:20px" id="fst"></div>
<button class="btn" id="rs">MAIN LAGI</button>
</div>
<div class="lvl" id="lvl">LEVEL UP!</div>
<div class="toast" id="toast"></div>
<div class="info" id="info">
<div>🦠 +10</div>
<div>🧟 +25</div>
<div>👾 +50</div>
<div>💀 -1❤️</div>
</div>
<script>
let score=0,level=1,time=60,health=3,run=false,germs=[],parts=[],combo=0,lk=0,tk=0,mc=0,stream=null,sim=false;
let yaw=0,pitch=0,by=0,bp=0,cal=false,gyro=false;
const WW=3000,WH=2000,VAH=50,VAV=40;
const cam=document.getElementById('cam');
const cvs=document.getElementById('cv');
const cx=cvs.getContext('2d');
const types=[
{emoji:'🦠',pts:10,sp:0.3,sz:50,hp:1,cl:'#4cd964'},
{emoji:'🧟',pts:25,sp:0.5,sz:60,hp:2,cl:'#ff9500'},
{emoji:'👾',pts:50,sp:0.7,sz:65,hp:3,cl:'#ff2d55'},
{emoji:'💀',pts:-50,sp:0.8,sz:55,hp:1,cl:'#ff3b30',bad:true}
];

function rsz(){cvs.width=innerWidth;cvs.height=innerHeight}
addEventListener('resize',rsz);rsz();

async function sc(){
try{if(stream)stream.getTracks().forEach(t=>t.stop());
stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
cam.srcObject=stream;cam.onloadedmetadata=()=>cam.play()}
catch(e){esim()}
}

function esim(){
sim=true;cam.style.display='none';
let d=document.createElement('div');
d.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0a1628,#1a2f4a);z-index:1';
document.body.insertBefore(d,cam);
}

function ig(){
if(window.DeviceOrientationEvent){
addEventListener('deviceorientation',ho);gyro=true;
if(typeof DeviceOrientationEvent.requestPermission==='function'){
DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')gyro=true}).catch(()=>{})
}
}else{gyro=false;im()}
}

let ld=false,lmx=0,lmy=0;
function im(){
document.addEventListener('mousedown',e=>{if(!run)return;ld=true;lmx=e.clientX;lmy=e.clientY});
document.addEventListener('mousemove',e=>{if(!ld||!run)return;yaw-=(e.clientX-lmx)*0.3;pitch-=(e.clientY-lmy)*0.3;pitch=Math.max(-60,Math.min(60,pitch));lmx=e.clientX;lmy=e.clientY});
document.addEventListener('mouseup',()=>ld=false);
document.addEventListener('touchstart',e=>{if(!run)return;ld=true;lmx=e.touches[0].clientX;lmy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchmove',e=>{if(!ld||!run)return;yaw-=(e.touches[0].clientX-lmx)*0.3;pitch-=(e.touches[0].clientY-lmy)*0.3;pitch=Math.max(-60,Math.min(60,pitch));lmx=e.touches[0].clientX;lmy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',()=>ld=false);
}

function ho(e){
if(!cal)return;
let a=e.alpha||0,b=e.beta||0;
yaw=a-by;if(yaw>180)yaw-=360;if(yaw<-180)yaw+=360;
pitch=b-bp;
}

let loe=null;
addEventListener('deviceorientation',e=>loe=e);

function clb(){
if(gyro&&loe){by=loe.alpha||0;bp=loe.beta||0}
cal=true;
document.getElementById('ss').classList.add('hidden');
sg();
}

class Germ{
constructor(){
let t=this.st();this.type=t;
this.wx=(Math.random()-0.5)*WW;this.wy=(Math.random()-0.5)*WH;this.wz=300+Math.random()*400;
this.sz=t.sz;this.hp=t.hp;this.mh=t.hp;this.sp=t.sp;this.dead=false;
this.lt=0;this.ml=1500+Math.random()*800;
this.vx=(Math.random()-0.5)*this.sp;this.vy=(Math.random()-0.5)*this.sp;
this.wb=Math.random()*Math.PI*2;this.ws=0.03+Math.random()*0.04;this.pp=0;this.sc=0;this.ts=1;
}
st(){let r=Math.random();if(r<0.5)return types[0];if(r<0.75)return types[1];if(r<0.9)return types[2];return types[3]}
up(){
this.lt++;this.wb+=this.ws;this.pp+=0.1;
if(this.sc<this.ts){this.sc+=0.06;if(this.sc>this.ts)this.sc=this.ts}
this.wx+=this.vx;this.wy+=this.vy;
if(Math.abs(this.wx)>WW/2)this.vx*=-1;if(Math.abs(this.wy)>WH/2)this.vy*=-1;
if(this.lt>this.ml&&!this.type.bad)this.dead=true;
}
vis(){
let ry=Math.atan2(this.wx,this.wz)*180/Math.PI;
let rp=Math.atan2(this.wy,this.wz)*180/Math.PI;
let dy=ry-yaw,dp=rp-pitch;
if(dy>180)dy-=360;if(dy<-180)dy+=360;
return Math.abs(dy)<VAH&&Math.abs(dp)<VAV;
}
spos(){
let ry=Math.atan2(this.wx,this.wz)*180/Math.PI;
let rp=Math.atan2(this.wy,this.wz)*180/Math.PI;
let dy=ry-yaw,dp=rp-pitch;
if(dy>180)dy-=360;if(dy<-180)dy+=360;
return{
x:cvs.width/2+(dy/VAH)*(cvs.width/2),
y:cvs.height/2+(dp/VAV)*(cvs.height/2),
s:Math.max(0.3,Math.min(1.5,500/this.wz))
};
}
dr(){
if(!this.vis())return;
let p=this.spos();if(!p)return;
let sx=p.x,sy=p.y,ds=p.s;
if(sx<-150||sx>cvs.width+150||sy<-150||sy>cvs.height+150)return;
cx.save();cx.translate(sx,sy);cx.scale(this.sc*ds,this.sc*ds);
let gs=this.sz*1.5+Math.sin(this.pp)*5;
let g=cx.createRadialGradient(0,0,0,0,0,gs);
g.addColorStop(0,this.type.cl+'40');g.addColorStop(1,'transparent');
cx.fillStyle=g;cx.beginPath();cx.arc(0,0,gs,0,Math.PI*2);cx.fill();
if(this.mh>1){
cx.strokeStyle=this.type.cl+'60';cx.lineWidth=3;cx.beginPath();cx.arc(0,0,this.sz*0.7,0,Math.PI*2);cx.stroke();
cx.strokeStyle=this.type.cl;cx.beginPath();cx.arc(0,0,this.sz*0.7,-Math.PI/2,-Math.PI/2+(this.hp/this.mh)*Math.PI*2);cx.stroke();
}
cx.font=this.sz+'px Arial';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(this.type.emoji,0,0);
cx.fillStyle='rgba(255,255,255,0.7)';cx.font='bold 11px Arial';cx.fillText(Math.round(this.wz/10)+'cm',0,this.sz*0.9);
cx.restore();
}
ht(){
this.hp--;if(this.hp<=0){this.dead=true;return true}
this.sc=1.3;setTimeout(()=>this.sc=1,100);return false;
}
ct(x,y){
let p=this.spos();if(!p)return false;
return Math.sqrt((x-p.x)**2+(y-p.y)**2)<this.sz*p.s;
}
}

class Part{
constructor(x,y,c){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*8;this.vy=(Math.random()-0.5)*8;this.l=1;this.d=0.02+Math.random()*0.03;this.s=3+Math.random()*5;this.c=c}
up(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.2;this.l-=this.d}
dr(){cx.globalAlpha=this.l;cx.fillStyle=this.c;cx.beginPath();cx.arc(this.x,this.y,this.s*this.l,0,Math.PI*2);cx.fill();cx.globalAlpha=1}
}

function ex(x,y,c,n=15){for(let i=0;i<n;i++)parts.push(new Part(x,y,c))}
function sct(x,y,t){
let e=document.createElement('div');e.className='combo';e.textContent=t;e.style.left=x+'px';e.style.top=y+'px';
document.body.appendChild(e);setTimeout(()=>e.remove(),1000);
}

function sg(){
if(!run)return;
let mx=3+level*2;if(germs.length<mx)germs.push(new Germ);
setTimeout(sg,Math.max(800,2500-level*200));
}

function lh(){
health--;document.getElementById('hp').textContent='❤️'.repeat(health)+'🖤'.repeat(3-health);
cvs.style.transform='translate(5px,5px)';setTimeout(()=>cvs.style.transform='translate(-5px,-5px)',50);setTimeout(()=>cvs.style.transform='',100);
if(health<=0)go();else toast('Kuman lolos! Nyawa: '+health);
}

function us(p){
let n=Date.now();
if(n-lk<1500){combo++;if(combo>mc)mc=combo}else{combo=1}
lk=n;
let cm=Math.min(combo,5),fp=p*cm;score+=fp;
document.getElementById('sc').textContent=score;
let nl=Math.floor(score/200)+1;
if(nl>level){level=nl;document.getElementById('lv').textContent=level;document.getElementById('lvl').classList.add('show');time+=15;toast('Level '+level+'! +15 detik');setTimeout(()=>document.getElementById('lvl').classList.remove('show'),1500)}
return{combo:cm,points:fp};
}

function toast(m){
let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}

function hi(e){
if(!run)return;e.preventDefault();
let r=cvs.getBoundingClientRect();
let x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
let y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
let hit=false;
for(let i=germs.length-1;i>=0;i--){
let g=germs[i];if(g.dead)continue;
if(g.ct(x,y)){
hit=true;
if(g.type.bad){lh();let p=g.spos();ex(p.x,p.y,'#ff3b30',25);sct(x,y,'💀 -1❤️');g.dead=true;break}
let k=g.ht();
if(k){tk++;let r=us(g.type.pts);let p=g.spos();ex(p.x,p.y,g.type.cl,20);sct(x.y,r.combo>1?'🔥x'+r.combo+' +'+r.points:'+'+r.points);g.dead=true}
else{let p=g.spos();ex(p.x,p.y,g.type.cl,5);sct(x,y,'💥')}
break;
}
}
if(!hit){ex(x,y,'#888',3);combo=0}
}

cvs.addEventListener('touchstart',hi,{passive:false});
cvs.addEventListener('mousedown',hi);

let glid=null,tmid=null;

function loop(){
if(!run)return;
cx.clearRect(0,0,cvs.width,cvs.height);
for(let i=germs.length-1;i>=0;i--){
let g=germs[i];g.up();g.dr();
if(g.dead){if(!g.type.bad)lh();germs.splice(i,1)}
}
for(let i=parts.length-1;i>=0;i--){let p=parts[i];p.up();p.dr();if(p.l<=0)parts.splice(i,1)}
glid=requestAnimationFrame(loop);
}

function tm(){
tmid=setInterval(()=>{
if(!run)return;
time--;document.getElementById('tm').textContent=time;
if(time<=10)document.getElementById('tm').style.color='#ff3b30';
if(time<=0)go();
},1000);
}

function start(){
score=0;level=1;time=60;health=3;germs=[];parts=[];combo=0;lk=0;tk=0;mc=0;run=true;
document.getElementById('sc').textContent='0';
document.getElementById('lv').textContent='1';
document.getElementById('tm').textContent='60';
document.getElementById('tm').style.color='#fff';
document.getElementById('hp').textContent='❤️❤️❤️';
document.getElementById('ss').classList.add('hidden');
document.getElementById('gos').classList.remove('active');
document.getElementById('hud').style.display='flex';
document.getElementById('info').style.display='flex';
if(glid)cancelAnimationFrame(glid);if(tmid)clearInterval(tmid);
sg();loop();tm();
toast('Berburu dimulai! Gerakkan HP!');
}

function go(){
run=false;
if(glid){cancelAnimationFrame(glid);glid=null}
if(tmid){clearInterval(tmid);tmid=null}
document.getElementById('fs').textContent=score;
document.getElementById('fst').innerHTML='Kuman: '+tk+'<br>Level: '+level+'<br>Combo: x'+mc;
document.getElementById('hud').style.display='none';
document.getElementById('info').style.display='none';
document.getElementById('gos').classList.add('active');
}

document.getElementById('st').addEventListener('click',()=>{sc().then(()=>{ig();clb()}).catch(()=>{esim();ig();clb()})});
document.getElementById('sim').addEventListener('click',()=>{esim();ig();clb()});
document.getElementById('rs').addEventListener('click',()=>{document.getElementById('gos').classList.remove('active');start()});
</script>
</body>
</html>q
